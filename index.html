<style>
:root{
--bg:#0d1117;
--card:#161b22;
--gold:#f4c430;
--gold-dark:#d4a017;
--text:#e6edf3;
--muted:#8b949e;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
}

/* Header */
.header{
background:linear-gradient(135deg,#f4c430,#d4a017);
padding:25px 15px;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
text-align:center;
color:#fff;
animation:fade 1s ease;
}

.bismillah{
font-size:20px;
font-weight:600;
margin-bottom:8px;
}

.welcome{
font-size:14px;
opacity:0.9;
}

/* Container */
.container{
max-width:480px;
margin:auto;
padding:15px;
}

/* Card */
.card{
background:var(--card);
border-radius:16px;
padding:15px;
margin-top:-20px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
animation:fade 0.6s ease;
}

/* Toggle */
.toggle{
display:flex;
background:#0d1117;
border-radius:10px;
padding:4px;
margin-bottom:15px;
}

.toggle button{
flex:1;
padding:10px;
border:none;
background:none;
color:var(--muted);
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.toggle button.active{
background:var(--gold);
color:#000;
}

/* Input */
.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#0d1117;
color:#fff;
}

/* Button New Style */
.btn{
background:linear-gradient(145deg,#f4c430,#d4a017);
color:#000;
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:700;
cursor:pointer;
box-shadow:0 4px 0 #b8960c;
transition:0.2s;
}

.btn:active{
transform:translateY(3px);
box-shadow:0 1px 0 #b8960c;
}

/* Loader */
.loader{
display:none;
text-align:center;
padding:20px;
}

.spinner{
width:30px;
height:30px;
border:3px solid #333;
border-top:3px solid var(--gold);
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* Result */
.result{
margin-top:15px;
}

.item{
background:#0d1117;
padding:12px;
border-radius:10px;
margin-bottom:10px;
animation:fade 0.4s ease;
}

.label{
font-size:12px;
color:var(--muted);
}

.value{
font-size:14px;
font-weight:600;
}

/* Credit */
.credit{
text-align:center;
margin-top:15px;
font-size:11px;
color:var(--muted);
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* ── Sirf Ads ke liye naye styles ── */
.ad-top{
text-align:center;
margin-bottom:12px;
}
.ad-bottom{
text-align:center;
margin-top:12px;
}
.ad-native{
margin-top:12px;
}
.ad-lbl{
font-size:9px;
color:#444;
text-transform:uppercase;
letter-spacing:0.5px;
margin-bottom:3px;
}
/* Timer overlay */
.t-overlay{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,0.85);z-index:9999;
flex-direction:column;align-items:center;justify-content:center;gap:15px;
}
.t-overlay.on{display:flex;}
.t-circle{
width:80px;height:80px;border-radius:50%;
background:var(--gold);
display:flex;align-items:center;justify-content:center;
font-size:34px;font-weight:900;color:#000;
}
.t-msg{color:#fff;font-size:14px;}
.t-skip{
background:none;border:1px solid #444;color:#888;
padding:8px 20px;border-radius:8px;cursor:pointer;font-size:12px;
}
</style>
</head>

<body>

<div class="header">

</div>

<div class="container">

<button onclick="setType('cnic',this)">CNIC</button>
</div>

<!-- TOP BANNER AD 320x50 -->
<div class="ad-top">
<div class="ad-lbl">Advertisement</div>
<script type="text/javascript">
atOptions = {
'key' : 'b17cbb4cae9fa5f11a417cbe192b21b0',

<script type="text/javascript" src="//www.highperformanceformat.com/b17cbb4cae9fa5f11a417cbe192b21b0/invoke.js"></script>

<input type="text" id="input" placeholder="Enter number...">
<button class="btn" onclick="searchWithAd()">Search</button>
</div>

<!-- Smart Link — Search button ke neeche -->
<div style="margin-top:8px;text-align:center;">
<a href="https://www.profitablecpmratenetwork.com/dwzkt6ix?key=75f31b3ac33d22455f4a218eb9f43d7b" target="_blank" style="font-size:11px;color:#8b949e;text-decoration:none;">🔗 Sponsored Link</a>
</div>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Searching...</p>
</div>

<div id="result" class="result"></div>

<!-- NATIVE BANNER AD -->
<div class="ad-native">
<div class="ad-lbl">Sponsored</div>
<script type="text/javascript" async data-cfasync="false" src="//pl29132912.profitablecpmratenetwork.com/c2f579805fbf25531231576237d7b703/invoke.js"></script>

<div class="ad-lbl">Advertisement</div>
<script type="text/javascript">
atOptions = {
'key' : '1d7bc8aea96970670ffb5e182766a441',

</div>
</div>

<script>
const API="https://famofc.site/api/database.php";
const SMARTLINK="https://www.profitablecpmratenetwork.com/dwzkt6ix?key=75f31b3ac33d22455f4a218eb9f43d7b";

let tInterval=null;

function setType(t,el){
document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

/* Search button click — Smart Link kholo + Timer dikhaо */
function searchWithAd(){
let val=document.getElementById("input").value.trim();
if(!val) return alert("Enter value");

/* Smart link nayi tab mein */
window.open(SMARTLINK,'_blank');

/* Timer shuru */
let count=10;
document.getElementById("tNum").textContent=count;
document.getElementById("tOverlay").classList.add("on");

tInterval=setInterval(()=>{
count--;
document.getElementById("tNum").textContent=count;
if(count<=0){
clearInterval(tInterval);
hideAndSearch();
}
},1000);
}

function skipTimer(){
clearInterval(tInterval);
hideAndSearch();
}

function hideAndSearch(){
document.getElementById("tOverlay").classList.remove("on");
search();
}

/* Original search function — bilkul same rakha */
async function search(){
let val=document.getElementById("input").value.trim();
if(!val) return alert("Enter value");

document.getElementById("loader").style.display="block";
document.getElementById("result").innerHTML="";

try{
let res=await fetch(`${API}?q=${encodeURIComponent(val)}`);
let data=await res.json();

if(!data.success) throw new Error();

let html="";
data.data.records.forEach(r=>{
html+=`
<div class="item">
<div class="label">Name</div>
<div class="value">${r.full_name||"N/A"}</div>

<div class="label">Phone</div>
<div class="value">${r.phone||"N/A"}</div>

<div class="label">CNIC</div>
<div class="value">${r.cnic||"N/A"}</div>

<div class="label">Address</div>
<div class="value">${r.address||"N/A"}</div>
</div>
`;
});

document.getElementById("result").innerHTML=html;

}catch{
document.getElementById("result").innerHTML="❌ No Data Found";
}

document.getElementById("loader").style.display="none";
}
</script>

</body>
